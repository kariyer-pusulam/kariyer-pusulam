<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kariyer Pusulan — Değerlendirme</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
:root{
  --black:#0f0d0a;--off-black:#1a1710;--dark:#242018;--mid:#3d3828;
  --warm-gray:#8c8270;--light-gray:#c4b9a8;--cream:#f5f0e8;
  --off-white:#faf8f4;--gold:#b8822a;--gold-light:#d4a255;
  --border:rgba(180,160,120,.15);--border-mid:rgba(180,160,120,.25);
  --teal:#2a6b5e;
}
body{font-family:'DM Sans',sans-serif;background:var(--off-white);color:var(--black);line-height:1.6;min-height:100vh;}

/* ── HEADER ── */
.header{background:var(--black);padding:1.1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.header-logo{font-family:'Libre Baskerville',serif;font-size:.85rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--cream);}
.header-progress{display:flex;align-items:center;gap:1rem;}
.header-pct{font-size:.75rem;color:var(--gold-light);font-weight:500;}
.progress-bar{width:140px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s ease;}

/* ── STEPS ── */
.steps-wrap{background:var(--off-black);border-bottom:1px solid rgba(255,255,255,.06);padding:.6rem 2rem;display:flex;gap:0;overflow-x:auto;}
.step-item{display:flex;align-items:center;gap:.4rem;padding:.3rem .75rem;border-radius:2rem;font-size:.68rem;font-weight:500;letter-spacing:.05em;color:rgba(250,248,244,.3);white-space:nowrap;cursor:default;}
.step-item.done{color:var(--teal);}
.step-item.active{color:var(--gold-light);background:rgba(196,136,58,.1);}
.step-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* ── CONTENT ── */
.content{max-width:720px;margin:0 auto;padding:3rem 2rem;}

/* ── BÖLÜM BAŞLIĞI ── */
.section-header{margin-bottom:2.5rem;}
.section-tag{font-size:.65rem;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.75rem;display:flex;align-items:center;gap:.6rem;}
.section-tag::before{content:'';display:block;width:20px;height:1px;background:var(--gold);}
.section-title{font-family:'Libre Baskerville',serif;font-size:1.6rem;font-weight:400;line-height:1.2;margin-bottom:.6rem;}
.section-desc{font-size:.88rem;color:var(--warm-gray);line-height:1.75;font-weight:300;}

/* ── CASE STUDY ── */
.case-card{background:#fff;border:1px solid var(--border-mid);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:1.75rem;margin-bottom:1.25rem;}
.case-num{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:.85rem;}
.case-text{font-size:.95rem;line-height:1.8;color:var(--black);margin-bottom:1.25rem;}
.case-question{font-size:.88rem;font-weight:600;color:var(--mid);margin-bottom:.85rem;padding-top:.85rem;border-top:1px solid var(--border);}
.case-textarea{width:100%;min-height:130px;padding:.85rem 1rem;border:1.5px solid var(--border-mid);border-radius:6px;font-size:.88rem;font-family:'DM Sans',sans-serif;color:var(--black);background:var(--off-white);resize:vertical;outline:none;line-height:1.7;transition:border-color .2s;}
.case-textarea:focus{border-color:var(--gold);background:#fff;}
.case-textarea::placeholder{color:var(--light-gray);}
.char-hint{font-size:.68rem;color:var(--light-gray);margin-top:.4rem;text-align:right;}

/* ── STANDART SORULAR ── */
.page-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;}
.page-label{font-size:.75rem;color:var(--warm-gray);}
.page-count{font-size:.75rem;font-weight:600;color:var(--gold);}

.q-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:1.1rem 1.25rem;margin-bottom:.5rem;transition:border-color .15s;}
.q-card.answered{border-color:rgba(180,160,120,.4);}
.q-num{font-size:.62rem;color:var(--light-gray);margin-bottom:.35rem;letter-spacing:.04em;}
.q-text{font-size:.88rem;line-height:1.55;margin-bottom:.75rem;color:var(--black);}

/* RIASEC opts */
.riasec-opts{display:flex;gap:.4rem;flex-wrap:wrap;}
.riasec-opt{padding:.38rem .85rem;border-radius:4px;border:1.5px solid var(--border-mid);font-size:.78rem;font-weight:500;color:var(--warm-gray);cursor:pointer;transition:all .12s;background:var(--off-white);user-select:none;}
.riasec-opt:hover{border-color:var(--gold-light);color:var(--black);}
.riasec-opt.sel{border-color:var(--gold);background:var(--gold);color:#fff;}

/* BIG FIVE likert */
.likert-row{display:flex;align-items:center;justify-content:space-between;gap:.5rem;}
.likert-labels{display:flex;justify-content:space-between;font-size:.62rem;color:var(--light-gray);margin-top:.35rem;}
.lk-opts{display:flex;gap:.3rem;}
.lk-opt{width:32px;height:32px;border-radius:5px;border:1.5px solid var(--border-mid);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .12s;color:var(--warm-gray);background:var(--off-white);}
.lk-opt:hover{border-color:var(--gold-light);color:var(--black);}
.lk-opt.sel{background:var(--gold);border-color:var(--gold);color:#fff;}

/* ── NAV ── */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:2rem;padding-top:1.25rem;border-top:1px solid var(--border-mid);}
.nav-info{font-size:.75rem;color:var(--light-gray);}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.75rem 1.75rem;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all .15s;letter-spacing:.02em;}
.btn-dark{background:var(--black);color:var(--off-white);}
.btn-dark:hover{background:var(--dark);}
.btn-outline{background:transparent;color:var(--mid);border:1.5px solid var(--border-mid);}
.btn-outline:hover{border-color:var(--black);color:var(--black);}
.btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── DONE ── */
.done-wrap{text-align:center;padding:4rem 1rem;}
.done-mark{font-family:'Libre Baskerville',serif;font-size:3rem;color:var(--gold);margin-bottom:1.5rem;}
.done-title{font-family:'Libre Baskerville',serif;font-size:2rem;font-weight:400;margin-bottom:.75rem;}
.done-desc{font-size:.95rem;color:var(--warm-gray);line-height:1.8;max-width:460px;margin:0 auto 2rem;font-weight:300;}
.done-box{background:var(--cream);border:1px solid var(--border-mid);border-radius:8px;padding:1.25rem 1.5rem;max-width:400px;margin:0 auto 2rem;text-align:left;}
.done-box-title{font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--warm-gray);margin-bottom:.75rem;}
.done-item{display:flex;align-items:center;gap:.6rem;font-size:.85rem;color:var(--mid);padding:.3rem 0;}
.done-check{width:16px;height:16px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:#fff;flex-shrink:0;}

/* ── WARN ── */
.warn-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:.75rem 1rem;font-size:.8rem;color:#856404;margin-bottom:1rem;display:none;}
.warn-banner.show{display:block;}

@media(max-width:600px){
  .content{padding:2rem 1rem;}
  .steps-wrap{padding:.6rem 1rem;}
  .lk-opt{width:28px;height:28px;font-size:.7rem;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Kariyer Pusulan</div>
  <div class="header-progress">
    <span class="header-pct" id="hdr-pct">0%</span>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="steps-wrap" id="steps-wrap">
  <div class="step-item active" id="step-0"><span class="step-dot"></span>RIASEC Case Study</div>
  <div class="step-item" id="step-1"><span class="step-dot"></span>RIASEC Testi</div>
  <div class="step-item" id="step-2"><span class="step-dot"></span>Kişilik Case Study</div>
  <div class="step-item" id="step-3"><span class="step-dot"></span>Kişilik Testi</div>
  <div class="step-item" id="step-4"><span class="step-dot"></span>Tamamlandı</div>
</div>

<div class="content" id="main-content"></div>

<script>
// ═══════════════════════════════════════════════
// VERİ
// ═══════════════════════════════════════════════

const RIASEC_CASES = [
  {
    num:'Case Study 1 / 6 — Gerçekçi',
    text:'Hayatında bir şeyi kendi ellerinle tamir ettiğin, onardığın ya da sıfırdan inşa ettiğin oldu mu?',
    q:'Olduysa o anı anlat — ne yaptın, nasıl hissettin. Olmadıysa böyle bir şey yapma fırsatın olsaydı ne yapardın?'

  },
  {
    num:'Case Study 3 / 6 — Artistik',
    text:'İçinde tam olarak tanımlayamadığın bir his var — ne olduğunu bilmiyorsun ama orada.',

  },
  {
    num:'Case Study 4 / 6 — Sosyal',
    text:'Bir grup projesi var. Herkes kendi bölümünü yapıp birleştirecek. Ama bir arkadaşın konuyu anlamıyor, geride kalıyor.',
    q:'Sen ne yaparsın? O süreç sana nasıl hissettiriyor?'
  },
  {
    num:'Case Study 5 / 6 — Girişimci',
    text:'Bir fikrin var ve bunu gerçeğe dönüştürmek istiyorsun. Ama bunun için başkalarını ikna etmen gerekiyor.',

  {

    q:'Sen o anda ne yapardın?'

];

const BF_CASES = [
  {
    num:'Case Study 1 / 5 — Dışadönüklük',
    text:'İki farklı haftasonu düşün. Birinde çok kalabalık, sosyal, enerjik bir ortam geçiriyorsun. Diğerinde tamamen yalnızsın, sessiz, kendi başına.',
    q:'Her ikisinin sonunda nasıl hissediyorsun? Hangisinin ardından daha dolu, daha kendin gibi hissediyorsun?'
  },
  {
    num:'Case Study 2 / 5 — Uyumluluk',
    text:'Grup ödevinde bir konu önerdin, ciddi hazırlık yaptın ve bu konunun daha yüksek not getireceğini düşünüyorsun. Ama arkadaşların konunu sıkıcı buluyor ve daha kolay bir konu istiyor. Tartışma uzuyor, öğretmen kararı size bırakıyor.',
    q:'Ne yapardın?'

  {
    num:'Case Study 3 / 5 — Sorumluluk',
    text:'Öğretmen sana 3 haftalık bir proje verdi. Ders notunun bir parçası ama öğretmen detaylı kontrol etmiyor ve istersen son gün de yapabilirsin. Arkadaşlarının çoğu projeyi erteliyor, kimse şu an çalışmıyor.',
    q:'Ne yapardın?'
  },
  {
    num:'Case Study 4 / 5 — Nevrotizm',
    text:'Okulda beklemediğin kötü bir haber aldın — düşük bir not, iptal olan bir plan, hayal kırıklığı yaratan bir sonuç.',
    q:'O andan sonra ne olur? Nasıl geçer?'
  },
  {
    num:'Case Study 5 / 5 — Deneyime Açıklık',
    text:'Herkesin doğru kabul ettiği bir şey — bir kural, bir gelenek, bir inanç — aklına takıldı ve "peki bu gerçekten doğru mu?" diye sormak istedin.',
    q:'Böyle bir anın oldu mu? O soruyla ne yaptın?'
  }
];

const RIASEC_QS = [
  "Kuşların nasıl göç ettiğini öğrenmek","İnsanlara yeni bir hobi öğretmek","Hava durumu tahmini için gözlem kullanmak","Bitki hastalıklarını incelemek","Banka faizini hesaplamak",
  "Resimler tasarlamak ve çizmek","İş yaptırmak için parayla adam tutmak","Bilim müzesini incelemek","Gözlük için mercekleri parlatmak","Yazarların yazı stillerini araştırmak",
  "Laboratuvar aletlerini kullanmak","Bir dükkanda envanter tutmak","Kuş yemliği tasarlamak","Oyun için takım oluşturmak","Yeni satış kampanyası düzenlemek",
  "Toplantı yönetmek","Vitaminlerin hayvanlara etkisini araştırmak","Küçük işletme yönetmek","Makine kullanımı için talimat yazmak","Başkaları için iş planlamak",
  "Küçük grup tartışmalarına katılmak","Yeni cerrahi işlemler hakkında okumak","Mali hesaplardaki hataları bulmak","Rapor taslağındaki hataları incelemek","Planlar ve grafikler yapmak",
  "Zarar görmüş ağacı onarmak","Kusur bulmak için mamulleri incelemek","Telefonla iş idare etmek","Acil durumlarda insanlara yardım etmek","Kuruluşun tüm mali işlerini yönetmek",
  "Müzik eseri bestelemek","Film müziği bestelemek","Yeni politikalar geliştirmek","Biyoloji çalışmak","Politik kampanyaya katılmak",
  "Maddeleri ayırıp saklamak","Toplum geliştirme projesinde çalışmak","Daktilo tamirini öğrenmek","Yıldızlar hakkında kitap okumak","Saati tam olarak ayarlamak",
  "Beynin nasıl çalıştığını öğrenmek","Yaratıcı fotoğraflar çekmek","Masraf kayıtları tutmak","Bir bandoda çalmak","Orkestrada caz çalmak",
  "Kulüp için bütçe hazırlamak","Depremin nedenlerini araştırmak","Bilim insanının dersine katılmak","Projede başkalarıyla çalışmak","Film senaryosu yazmak",
  "İşçilerle röportaj yapmak","Mobilya yapmak","Değerli taş kesmeyi öğrenmek","Yaralıya ilk yardım yapmak","Radyo için müzik seçmek",
  "İl meclisinde çalışmak","Mali raporları yorumlamak","Tehlikedeki insana yardım etmek","Elektronik alet çalıştırmak","Çocuklara oyun öğretmek",
  "Televizyon tamirini seyretmek","Hikaye anlatan çizimler yapmak","Ziyaretçilere yol göstermek","Problem çözümlerini öğrenmek","Sergiye gezi düzenlemek",
  "Bağımlılık konusunda danışmanlık","İş dergileri okumak","Yıldızların oluşumunu öğrenmek","Taksit ödemeleri tahsil etmek","Projektör çalıştırmak",
  "Kelebekleri sınıflandırmak","Metal heykel tasarlamak","İnsanlara kanuni hakları açıklamak","Kısa hikaye yazmak","Mali kararlarda insanlara yardım etmek",
  "Vergi beyannamesi düzenlemek","Takdir belgesi kazanmak","Sanatsal etkinlikleri eleştirmek","Aylık bütçe planı yapmak","Gölde yabani hayatı araştırmak",
  "Tiyatro oyununda rol almak","Resim çerçevesi yapmak","İş gezilerine çıkmak","Orman yangını gözetlemek","AVM tanıtımı yapmak",
  "Muhasebecilik sistemi kurmak","Tartışmayı yatıştırmak","Önemli kararda birine yardım etmek","Nakliye maliyetlerini hesaplamak","Fıkra anlatarak eğlendirmek"
];

const BF_QS = [
  "Partinin / ortamın baş eğlencesiyimdir.","Başkalarına karşı çok az endişe duyarım.","Her zaman hazırlıklıyımdır.","Kolayca strese girerim.","Zengin bir kelime dağarcığım vardır.",
  "Fazla konuşmam.","İnsanlarla ilgilenirim.","Eşyalarımı ortalıkta bırakırım.","Çoğu zaman rahatımdır.","Soyut fikirleri anlamakta zorlanırım.",
  "İnsanların arasında rahat hissederim.","İnsanları incitecek şeyler söylerim.","Ayrıntılara dikkat ederim.","Şeyler hakkında endişelenirim.","Canlı bir hayal gücüm vardır.",
  "Geri planda kalmayı tercih ederim.","Başkalarının duygularını anlarım.","İşleri karmaşıklaştırırım.","Nadiren üzgün hissederim.","Soyut fikirlerle ilgilenmem.",
  "Sohbet başlatırım.","Başkalarının sorunlarıyla ilgilenmem.","Ev işlerini hemen hallederim.","Kolayca rahatsız olurum.","Mükemmel fikirlerim olur.",
  "Söyleyecek fazla bir şeyim olmaz.","Yumuşak kalpliymdir.","Eşyaları yerlerine koymayı sık sık unuturum.","Kolayca kızarım.","İyi bir hayal gücüm olduğunu düşünmüyorum.",
  "Sosyal ortamlarda çok farklı insanlarla konuşurum.","Aslında başkalarıyla pek ilgilenmem.","Düzeni severim.","Ruh halim çok değişir.","Fikirleri çabuk kavrarım.",
  "Dikkat çekmekten hoşlanmam.","Başkaları için zaman ayırırım.","Sorumluluklarımdan kaçarım.","Sık sık ruh hali değişimleri yaşarım.","Zor kelimeler kullanırım.",
  "İlgi odağı olmaktan rahatsız olmam.","Başkalarının duygularını hissederim.","Bir programa göre hareket ederim.","Kolayca sinirlenebilirim.","Şeyler üzerinde derin düşünürüm.",
  "Tanımadığım insanların yanında sessiz kalırım.","İnsanları rahatlatırım.","İşimde titizimdir.","Sık sık kendimi üzgün hissederim.","Fikirlerle doluyumdur."
];

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
const SECTIONS = ['rc','r90','bc','b50'];
let state = loadState();

function loadState(){
  try{
    const s = localStorage.getItem('kp_test_state');
    if(s) return JSON.parse(s);
  }catch(e){}
  return {
    section: 0,      // 0=RC, 1=R90, 2=BC, 3=B50, 4=done
    rcPage: 0,       // case study index 0-5
    r90Page: 0,      // page 0-8 (10 soru/sayfa)
    bcPage: 0,       // case study index 0-4
    b50Page: 0,      // page 0-4 (10 soru/sayfa)
    rcAns: {},       // {0:'metin',...}
    r90Ans: {},      // {1:2, 2:1,...} (soru no: 0/1/2)
    bcAns: {},
    b50Ans: {}       // {1:3,...} likert
  };
}

function saveState(){
  try{ localStorage.setItem('kp_test_state', JSON.stringify(state)); }catch(e){}
}

// ═══════════════════════════════════════════════
// İLERLEME
// ═══════════════════════════════════════════════
function calcProgress(){
  const rc = Object.values(state.rcAns).filter(v=>v&&v.trim()).length;
  const r90 = Object.keys(state.r90Ans).length;
  const bc = Object.values(state.bcAns).filter(v=>v&&v.trim()).length;
  const b50 = Object.keys(state.b50Ans).length;
  const total = 6 + 90 + 5 + 50;
  const done = rc + r90 + bc + b50;
  return Math.round(done / total * 100);
}

function updateProgress(){
  const pct = calcProgress();
  document.getElementById('hdr-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  for(let i=0;i<=4;i++){
    const el = document.getElementById('step-'+i);
    el.className = 'step-item';
    if(i < state.section) el.classList.add('done');
    else if(i === state.section) el.classList.add('active');
  }
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function render(){
  updateProgress();
  const c = document.getElementById('main-content');
  if(state.section === 0) renderRC(c);
  else if(state.section === 1) renderR90(c);
  else if(state.section === 2) renderBC(c);
  else if(state.section === 3) renderB50(c);
  else renderDone(c);
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── RC ──
function renderRC(c){
  const p = state.rcPage;
  const cs = RIASEC_CASES[p];
  const saved = state.rcAns[p] || '';
  c.innerHTML = `
    <div class="section-header">
      <div class="section-tag">Bölüm 1 — Mesleki İlgi Senaryoları</div>
      <h1 class="section-title">Gerçek deneyimlerinden anlat</h1>
      <p class="section-desc">Aşağıdaki durumları okuyup kendi cümlelerinle yanıtla. Doğru ya da yanlış cevap yok — seni anlamamıza yardımcı olacak olan dürüst cevapların.</p>
    </div>
    <div class="warn-banner" id="warn">Bu soruyu yanıtlamadan devam edilemiyor.</div>
    <div class="case-card">
      <div class="case-num">${cs.num}</div>
      <div class="case-text">${cs.text}</div>
      <div class="case-question">${cs.q}</div>
      <textarea class="case-textarea" id="rc-ta" placeholder="Cevabını buraya yaz..." oninput="state.rcAns[${p}]=this.value;saveState()">${saved}</textarea>
      <div class="char-hint" id="char-hint">${saved.length} karakter</div>
    </div>
    <div class="nav-row">
      <button class="btn btn-outline" onclick="rcPrev()" ${p===0?'disabled':''}>← Geri</button>

// ── DONE ──
function renderDone(c){
  // Make.com webhook'una verileri gönder
  sendToMake();
  c.innerHTML = `
    <div class="done-wrap">
      <div class="done-mark">✦</div>
      <h1 class="done-title">Değerlendirme tamamlandı</h1>
      <p class="done-desc">Tüm sorular başarıyla kaydedildi. Uzman psikolog ve PDR danışmanlarımız cevaplarını inceleyecek ve 48 saat içinde kişisel raporun hazır olacak.</p>
      <div class="done-box">
        <div class="done-box-title">Tamamlananlar</div>
        <div class="done-item"><div class="done-check">✓</div>Mesleki ilgi senaryoları (6 soru)</div>
        <div class="done-item"><div class="done-check">✓</div>Mesleki ilgi testi (90 soru)</div>
        <div class="done-item"><div class="done-check">✓</div>Kişilik senaryoları (5 soru)</div>
        <div class="done-item"><div class="done-check">✓</div>Kişilik testi (50 soru)</div>
      </div>
      <p style="font-size:.82rem;color:var(--warm-gray)">Raporun 48 saat içinde <strong>${localStorage.getItem('kp_email') || 'mail adresine'}</strong> gönderilecek.</p>
    </div>`;
}

function sendToMake(){
  const MAKE_WEBHOOK = 'MAKE_WEBHOOK_URL_BURAYA';
  const payload = {
    email: localStorage.getItem('kp_email') || '',
    name: localStorage.getItem('kp_name') || '',
    plan: localStorage.getItem('kp_plan') || '',
    timestamp: new Date().toISOString(),
    answers: JSON.parse(localStorage.getItem('kp_test_state') || '{}')
  };
  fetch(MAKE_WEBHOOK, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(err => console.log('Webhook hatası:', err));
  // Test verilerini temizle
  localStorage.removeItem('kp_test_state');
}

// ── BAŞLAT ──
render();
